<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.cve_id }} - {{ page.title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.1.0/github-markdown.min.css">
    <style>
        body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
        @media (max-width: 767px) { body { padding: 15px; } }
        .markdown-body { box-sizing: border-box; }
        .header-link { font-size: 0.9em; margin-bottom: 20px; display: inline-block; }
        /* Pcap 버튼 스타일 */
        .pcap-btn {
            display: inline-block;
            background-color: #0366d6;
            color: white !important;
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="markdown-body">
        <a href="{{ site.baseurl }}/" class="header-link">🔙 목록으로 돌아가기</a>
        
        <h1>{{ page.cve_id }}: {{ page.title }}</h1>
        
        {% if page.nuclei_url %}
        <p>
            <strong>🔗 Nuclei Template:</strong> 
            <a href="{{ page.nuclei_url }}" target="_blank">{{ page.nuclei_url }}</a>
        </p>
        {% endif %}

        <p>
            <strong>🦈 Packet Capture:</strong> 
            <a href="/pcaps/{{ page.slug }}.pcap" download class="pcap-btn">
                ⬇️ Download {{ page.slug }}.pcap
            </a>
        </p>
        
        <hr>
        
        {{ content }}
        
    </div>
</body>
</html>
